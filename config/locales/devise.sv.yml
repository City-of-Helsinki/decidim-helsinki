sv:
  devise:
    omniauth_callbacks:
      disabled: Inloggning är tillfälligt inaktiverad.
    passwords:
      edit:
        password_help: "Minst %{minimun_characters} tecken, får inte vara för vanligt (som 123456) och måste vara skilt från ditt namn och din e-postadress."
        password_help_admin: "Minst %{minimun_characters} tecken, får inte vara för vanligt (som 123456) och måste vara skilt från ditt namn och din e-postadress. Måste också vara annorlunda än dina gamla lösenord."
    sessions:
      new:
        sign_in: 'Logga in med VårStad konto'
    shared:
      omniauth:
        helsinki:
          description: 'Du kan logga med Helsingforsprofilen.'
          sign_in_with: 'Helsingforsprofilen'
          sign_in_button: 'Logga in med Helsingforsprofilen'
        sms:
          description: 'Som elev kan du logga in med SMS eller en kod som din lärare eller ungdomshandledare får.'
          sign_in_with: 'SMS-inloggning'
          sign_in_button: 'Logga in via SMS'
        strong:
          description: 'Logga in på %{domain}-tjänsten med bank-ID eller mobil-ID. Studenter i grundskolan kan logga in med elevens konto.'
          sign_in_with: 'Logga in och identifiera dig elektroniskt'
        suomifi:
          description: 'Suomi.fi bjuder på möjligheten att identifiera sig bl.a. genom finska bankkoder och mobilcertifikat.'
          sign_in_with: 'Suomi.fi-identifiering'
          sign_in_button: 'Logga in med bankkoder eller mobilcertifikat'
        mpassid:
          description: 'Som grundskolestudent kan du identifiera dig själv genom MPASSid-tjänsten med ditt skolkonto.'
          sign_in_with: 'MPASSid-identifikation'
          sign_in_button: 'Logga in med elevens konto'
        weak:
          description: 'Du kan också logga in med sociala mediekonton (bl.a. Facebook, Yle, Google) eller med Omastadi-kontot du skapade tidigare.'
          sign_in_with: 'Logga in utan identifikation'
          sign_in_button: 'Logga in med Helsingforsprofilen'
  decidim:
    devise:
      omniauth_registrations:
        new:
          nickname_help: |
            Ditt användarnamn i %{organization} -tjänsten. Kan bara innehålla bokstäver (a-z), siffror, bindestreck "-" och understreck "_".
            Till exempel "heidi_helsingfors", "HenrikHelsinfors" eller "ulla-uppfinningsrik". Användarnamnet måste vara
            unikt, dvs. två användare kan inte ha samma användarnamn.
      registrations:
        new:
          newsletter: Jag skulle vilja få enstaka nyhetsbrev med relevant information.
          nickname_help: |
            Ditt användarnamn i %{organization} -tjänsten. Kan bara innehålla bokstäver (a-z), siffror, bindestreck "-" och understreck "_".
            Till exempel "heidi_helsingfors", "HenrikHelsinfors" eller "ulla-uppfinningsrik". Användarnamnet måste vara
            unikt, dvs. två användare kan inte ha samma användarnamn.
          password_tooltip_html: |
            <ul>
              <li>Minst %{min_length} tecken</li>
              <li>Får inte vara för vanligt (som 123456)</li>
              <li>Måste vara skilt från ditt användarnamn och din e-postadress</li>
            </ul>
          sign_up_service_account: 'Skapa eget konto'
          sign_up_service_account_description: 'Skapa ett eget användarkonto och logga i fortsättningen in med din e-postadress och ditt eget lösenord.'
          terms: användarvillkoren
          tos_title: Samtycke till behandling av personuppgifter och användarvillkor
          tos_agreement: Jag ger mitt samtycke till behandlingen av mina ovan nämnda personuppgifter för att producera tjänsten OmaStadi och jag godkänner %{link}. Jag intygar härmed att jag är 13-år eller äldre.
      sessions:
        default:
          omniauth:
            mpassid:
              title: Elevens konto
              description: A student's account is a personal account of a student studying in Helsinki schools.
            suomifi:
              title: Bank-ID eller mobilcertifikat
              description: Ett bank-ID är ett personligt ID som tillhandahålls av din bank, och ett mobilcertifikat är ett personligt ID som utfärdas av din mobiloperatör.
        new:
          are_you_new?: Är du ny på plattformen?
          register: Skapa ett nytt VårStad konto
          sign_in_intro_html: <p>Du kan logga in med ditt VårStad konto, bank-ID eller mobilcertifikat. Elever i grundskolan kan också logga in med skolkonto.</p>
          sign_in_service_account: 'Logga in med VårStad konto'
          sign_in_service_account_description: 'Logga in med e-postadress och ett lösenord som du själv väljer.'
